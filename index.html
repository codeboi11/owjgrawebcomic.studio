<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Owjgra's Web Comics</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Honk:MORF@15&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #4da6ff; /* blue background */
      font-family: Arial, sans-serif;
    }

    h1 {
      font-family: "Honk", system-ui;
      font-size: 3rem;
      padding: 20px;
    }

    p {
      font-size: 1.2rem;
      padding: 20px;
      max-width: 600px;
      line-height: 1.5;
    }

    img {
      display: block;
      margin: 20px auto;
      max-width: 90%;
      height: auto;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <h1>Welcome to Owjgra Web Comics!</h1>

  <p>
    Owjgra's Web Comics is a place where I can post my manga panels and comics as an artist for fun.
    Completely free, and I take requests. Thanks!
  </p>

  <!-- Your image appears right here -->
  <h2> Weekly Comic</h2>
  <img src="webcomic.png" alt="Comic Image">

</body>
</html>
